# Client deployment — pulls pre-built images from GitHub Container Registry.
# No source code needed on the client machine.
#
# Usage:
#   First install:  docker compose -f docker-compose.client.yml up -d
#   Update:         docker compose -f docker-compose.client.yml pull && docker compose -f docker-compose.client.yml up -d

services:
  db:
    image: postgres:15-alpine
    container_name: pharma-pos-db
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_INITDB_ARGS: "-E UTF8"
      TZ: Africa/Accra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pharma_user} -d ${POSTGRES_DB:-pharma_pos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharma-network

  backend:
    image: ghcr.io/johnevansokyere/pharma-pos-backend:latest
    container_name: pharma-pos-backend
    restart: unless-stopped
    pull_policy: always
    env_file:
      - ./backend/.env
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_BACKEND: postgresql
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      ENVIRONMENT: production
      DEBUG: "false"
      BACKEND_CORS_ORIGINS: '["http://localhost:8080","http://localhost","http://frontend"]'
      TIMEZONE: Africa/Accra
      TZ: Africa/Accra
    ports:
      - "8000:8000"
    volumes:
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pharma-network

  frontend:
    image: ghcr.io/johnevansokyere/pharma-pos-frontend:latest
    container_name: pharma-pos-frontend
    restart: unless-stopped
    pull_policy: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pharma-network

volumes:
  postgres_data:
    driver: local

networks:
  pharma-network:
    driver: bridge
