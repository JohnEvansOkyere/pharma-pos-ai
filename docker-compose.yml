services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: pharma-pos-db
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_INITDB_ARGS: "-E UTF8"
      TZ: Africa/Accra
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-pharma_user} -d $${POSTGRES_DB:-pharma_pos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharma-network
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pharma-pos-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_BACKEND: postgresql
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      APP_NAME: "Pharma POS AI"
      ENVIRONMENT: production
      DEBUG: "false"
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://localhost:8080","http://frontend","http://localhost"]'
      # Add timezone for APScheduler CronTrigger
      TIMEZONE: Africa/Accra
      TZ: Africa/Accra
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pharma-network
  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: pharma-pos-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: /api
    ports:
      - "8080:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pharma-network
  # Optional admin tooling
  pgadmin:
    image: dpage/pgadmin4
    container_name: pharma-pos-pgadmin
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8081:80"
    depends_on:
      - db
    networks: 
      - pharma-network
    profiles: ["admin-tools"]
    volumes:
    - pgadmin_data:/var/lib/pgadmin
    
volumes:
  postgres_data:
    driver: local
    
  pgadmin_data:
    driver: local
networks:
  pharma-network:
    driver: bridge
